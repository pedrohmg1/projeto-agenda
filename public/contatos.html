<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Contatos - Agenda Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">📋 Lista de Contatos</h1>
            <a href="/" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition font-bold shadow">
                + Novo Contato
            </a>
        </div>

        <div class="mb-4">
            <input type="text" id="busca" placeholder="Filtrar por nome..." 
                class="w-full md:w-1/3 px-4 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="bg-white shadow-md rounded-lg overflow-hidden">
            <table class="min-w-full">
                <thead class="bg-gray-800 text-white">
                    <tr>
                        <th class="px-6 py-4 text-left">Nome</th>
                        <th class="px-6 py-4 text-left">E-mail</th>
                        <th class="px-6 py-4 text-left">Empresa</th>
                        <th class="px-6 py-4 text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-corpo" class="divide-y divide-gray-200 text-gray-700"></tbody>
            </table>
        </div>
    </div>

    <script>
        let contatosRaw = [];
        const corpo = document.getElementById('tabela-corpo');

        function renderizar(lista) {
            corpo.innerHTML = lista.map(c => `
                <tr class="hover:bg-gray-50 transition">
                    <td class="px-6 py-4 font-medium">${c.nome}</td>
                    <td class="px-6 py-4">${c.email}</td>
                    <td class="px-6 py-4">${c.empresa || '-'}</td>
                    <td class="px-6 py-4 text-center">
                        <a href="/delete/${c.id}" onclick="return confirm('Excluir contato?')" 
                           class="text-red-600 hover:bg-red-50 px-3 py-1 rounded-md text-sm font-bold border border-red-200">
                           🗑️ Excluir
                        </a>
                    </td>
                </tr>
            `).join('');
        }

        fetch('/api/contatos').then(r => r.json()).then(data => {
            contatosRaw = data;
            renderizar(data);
        });

        document.getElementById('busca').addEventListener('input', (e) => {
            const termo = e.target.value.toLowerCase();
            const filtrados = contatosRaw.filter(c => c.nome.toLowerCase().includes(termo));
            renderizar(filtrados);
        });
    </script>
</body>
</html>
